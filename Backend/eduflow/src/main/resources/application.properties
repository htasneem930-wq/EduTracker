spring.application.name=eduflow

# Server
server.port=8081

# Database
spring.datasource.url=jdbc:mysql://localhost:3306/eduflow_db
spring.datasource.username=your_username
spring.datasource.password=your_password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# \u2705 FIX: MySQL8Dialect was REMOVED in Hibernate 6 (used by Spring Boot 3.x)
# Use MySQLDialect instead \u2014 it auto-detects the MySQL version
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Email (Gmail)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your_mail
spring.mail.password=your_password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# File Upload
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
app.upload.dir=uploads/

# App OTP
app.otp.expiry-minutes=5
